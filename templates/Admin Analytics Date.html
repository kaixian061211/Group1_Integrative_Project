<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>College Hostel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet"/>
</head>
<body>

  <div class="d-flex vh-100">

        <!-- Sidebar -->
        <aside class="sidebar d-flex flex-column">
            <!-- Brand -->
            <div class="sidebar-brand">
                <span class="brand-chms">INTI</span>
            </div>

            <!-- Username -->
            <div class="sidebar-username">
                <span>{{session["fullname"]}}</span>
            </div>

      <!-- Nav -->
            <nav class="sidebar-nav flex-grow-1">
            <div class="nav-section-label">Main</div>
            <a href="/admin_dashboard" class="nav-item">Dashboard</a>
            <a href="/admin_user_list_application" class="nav-item">User List</a>
            <a href="/admin_room" class="nav-item">Room</a>

            <div class="nav-section-label mt-3">Insights</div>
            <a href="/admin_analytics_date" class="nav-item active">Analytics</a>
            <a href="/admin_due_payment" class="nav-item">Due Payment</a>
            <a href="/admin_announcement_page" class="nav-item">Announcement</a>

            <div class="nav-section-label mt-3">Account</div>
            <a href="/admin_profile" class="nav-item">Profile</a>
            </nav>
        </aside>

    <!-- Main Content -->
    <div class="main-wrapper d-flex flex-column flex-grow-1">

      <!-- Top Bar -->
      <header class="topbar d-flex align-items-center justify-content-between">
        <h1 class="page-title">Analytics</h1>
        <a href="/user_logout" class="btn btn-logout">Logout</a>
      </header>

      <!-- Content Area -->
      <main class="content-area flex-grow-1 p-3">
          <div class="content-card h-100 d-flex flex-column p-3 overflow-y-auto">
              <div class="d-flex gap-2 align-items-end mb-3">
                  <form method="POST" action="/admin_analytics_date">
                      <div class="d-flex gap-2 align-items-end mb-3">
                          <div>
                              <label class="form-label mb-1 text-white">Start Date</label>
                              <input type="date" class="form-control" name="start_date" id="start_date">
                          </div>
                          <div>
                              <label class="form-label mb-1 text-white">End Date</label>
                              <input type="date" class="form-control" name="end_date" id="end_date">
                          </div>
                          <button type="submit" class="btn btn-primary">Apply</button>
                      </div>
                  </form>
              </div>
          </div>
      </main>

    </div>
  </div>
</body>
</html>
