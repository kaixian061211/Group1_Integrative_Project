<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>INTI – Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet"/>
</head>
<body>

<!-- Navbar -->
<nav class="topbar d-flex align-items-center justify-content-between">
    <span class="brand-chms">INTI</span>
    <div class="landing-nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Services</a>
    </div>
</nav>

<!-- Page Body -->
<div class="landing-body">
    <div class="d-flex flex-column align-items-center w-100 px-4">

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-2 w-100" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Login Card -->
        <div class="content-card d-flex overflow-hidden w-100" style="height: 75vh;">

            <!-- Left: Form -->
            <div class="login-form-panel">
                <h1 class="page-title mb-4">Application</h1>

                <form method="POST" action="/user_application">
                    <input type="text" name="fullname" class="login-input"
                           placeholder="Full Name" required>
                    <input type="text" name="email" class="login-input"
                           placeholder="Email" required>
                    <select name="gender" class="login-input">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                    <input type="text" name="phone" class="login-input"
                           placeholder="Phone Number" required>
                    <input type="password" name="password" class="login-input"
                           placeholder="Password" required>
                    <input type="password" name="confirm_password" class="login-input"
                           placeholder="Confirm Password" required>


                    <button type="submit" class="btn-logout w-100 mt-2">Apply</button>
                </form>

                <p class="login-register">
                    Already have an account? <a href="/user_login">Login</a>
                </p>
            </div>

            <!-- Right: Image -->
            <div class="login-image-panel">
                <img src="{{ url_for('static', filename='hostel.jpg') }}" alt="Hostel room">
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
